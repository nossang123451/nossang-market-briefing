          </div>
          <div style={{display:"flex",gap:20,fontSize:12,flexWrap:"wrap"}}>
            {[["시가",`₩${stock.open.toLocaleString()}`],["고가",`₩${stock.high.toLocaleString()}`],
              ["저가",`₩${stock.low.toLocaleString()}`],["시총",stock.mktcap],
              ["52H",`₩${stock.hi52.toLocaleString()}`],["52L",`₩${stock.lo52.toLocaleString()}`]]
              .map(([k,v])=>(
              <div key={k}>
                <div style={{color:C.textSec,fontSize:10,marginBottom:2}}>{k}</div>
                <div style={{color:C.textPrimary,fontWeight:600}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      {/* 탭 */}
      <div style={{display:"flex",background:"#0B0D20",borderBottom:`1px solid ${C.border}`,
        overflowX:"auto",scrollbarWidth:"none"}}>
        {TABS.map(t=>{
          const a=tab===t.id;
          return(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              border:"none",cursor:"pointer",padding:"13px 18px",
              background:a?C.panel:"transparent",
              borderBottom:a?`2px solid ${C.mg}`:"2px solid transparent",
              color:a?C.mg:C.textSec,fontWeight:a?700:400,
              fontSize:12,whiteSpace:"nowrap",transition:"all 0.2s"}}>
              {t.icon} {t.label}
            </button>
          );
        })}
      </div>
      {/* 본문 */}
      <div style={{padding:"20px 24px",maxWidth:1100,margin:"0 auto"}}>
        {tab==="overview"  &&<OverviewTab  stock={stock}/>}
        {tab==="business"  &&<BusinessTab/>}
        {tab==="financial" &&<FinancialTab/>}
        {tab==="compare"   &&<CompareTab/>}
        {tab==="news"      &&<NewsTab/>}
        {tab==="report"    &&<ReportTab/>}
        {tab==="opinion"   &&<OpinionTab/>}
        {tab==="technical" &&<TechnicalTab/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
